<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Séchoir – Contrôle BLE</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4f8; margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 12px 14px; margin-bottom: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        h1, h2 { margin: 0 0 10px 0; font-weight: 600; }
        h1 { font-size: 1.3rem; }
        h2 { font-size: 1rem; border-left: 3px solid #3b82f6; padding-left: 8px; margin-bottom: 10px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        button { background: #3b82f6; border: none; color: white; font-size: 0.75rem; padding: 6px 12px; border-radius: 30px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-off { background: #ef4444; }
        .mode-btn { background: #64748b; margin-right: 4px; }
        .trappes-btn, .res-btn { background: #64748b; margin-right: 4px; }
        .badge { background: #e2e8f0; border-radius: 30px; padding: 4px 10px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th, td { padding: 6px 3px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; font-weight: 600; }
        .sensor-name { font-weight: 600; text-align: left; }
        .value { font-weight: 700; font-family: monospace; font-size: 0.85rem; }
        .control-row { display: flex; flex-wrap: nowrap; align-items: center; gap: 8px; margin: 12px 0; }
        .control-row label { width: 75px; font-weight: 600; font-size: 0.75rem; flex-shrink: 0; }
        input[type="range"] { flex: 2; min-width: 100px; height: 4px; margin: 0; }
        input[type="range"]:disabled { opacity: 0.5; }
        input[type="number"] { width: 100px; padding: 4px 6px; border-radius: 20px; border: 1px solid #cbd5e1; font-size: 0.75rem; text-align: center; }
        .slider-value { min-width: 32px; text-align: center; font-weight: 600; font-size: 0.75rem; flex-shrink: 0; }
        .feedback-value { min-width: 38px; text-align: center; background: #eef2ff; border-radius: 20px; padding: 2px 6px; font-size: 0.7rem; font-weight: 600; margin-left: 2px; flex-shrink: 0; }
        .feedback-label { font-size: 0.7rem; margin-left: 2px; flex-shrink: 0; }
        .inline-buttons { display: flex; gap: 6px; flex-wrap: nowrap; flex: 2; }
        .inline-buttons button { flex: 1; text-align: center; padding: 5px 8px; font-size: 0.7rem; }
        .log-box { background: #0f172a; color: #a5f3fc; font-family: monospace; font-size: 0.6rem; padding: 8px; border-radius: 16px; max-height: 120px; overflow-y: auto; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .lum-line { background: #f8fafc; border-radius: 20px; padding: 8px 12px; margin-top: 8px; text-align: left; font-weight: 600; font-size: 0.9rem; }
        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-top: 12px; background: #f8fafc; border-radius: 16px; padding: 10px; }
        .sensor-grid div { font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="status-bar">
            <h1>🌾 Séchoir BLE</h1>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button id="connectBtn">🔌 Connecter</button>
                <span id="connStatus" class="badge">Déconnecté</span>
            </div>
        </div>
    </div>

    <!-- Capteurs -->
    <div class="card">
        <h2>📊 Capteurs</h2>
        <table id="sensorTable"><thead><tr><th>Capteur</th><th>🌡️ Temp.</th><th>💧 Humid.</th></tr></thead><tbody id="sensorBody"></tbody></table>
        <div class="lum-line">💡 Luminosité : <span id="lumValue">--</span> lumen</div>
        <div class="sensor-grid">
            <div>🔋 Vbat : <span id="vbatValue">--</span> V</div>
            <div>🔌 Ibat : <span id="ibatValue">--</span> A</div>
            <div>☀️ Vppv : <span id="vppvValue">--</span> V</div>
            <div>⚡ Pppv : <span id="pppvValue">--</span> W</div>
            <div>📊 État batterie : <span id="batStatusValue">--</span></div>
        </div>
    </div>

    <!-- Commandes -->
    <div class="card">
        <h2>🎛️ Commandes</h2>
        <div class="control-row"><label>🔘 Action</label><div class="inline-buttons">
            <button id="offBtn" class="btn-off" disabled>Éteindre</button>
            <button id="modeAutoBtn" class="mode-btn" disabled>Auto</button>
            <button id="modeManualBtn" class="mode-btn" disabled>Manuel</button>
        </div><span id="modeStatus" class="feedback-value">Mode: --</span></div>

        <div class="control-row" style="display: flex; gap: 20px; align-items: center;">
            <div><label style="width:auto;">☀️ Seuil jour</label><input type="number" id="luxDayInput" step="50" style="width:100px;" disabled><span class="feedback-label">↺</span><span id="luxDayFeedback" class="feedback-value">--</span><span>lx</span></div>
            <div><label style="width:auto;">🌙 Seuil nuit</label><input type="number" id="luxNightInput" step="50" style="width:100px;" disabled><span class="feedback-label">↺</span><span id="luxNightFeedback" class="feedback-value">--</span><span>lx</span></div>
        </div>

        <div class="control-row"><label>🚪 Trappes</label><div class="inline-buttons">
            <button id="trappesOpenBtn" class="trappes-btn" disabled>Ouvrir</button>
            <button id="trappesCloseBtn" class="trappes-btn" disabled>Fermer</button>
        </div><span id="trappesStatus" class="feedback-value">État: --</span></div>

        <div class="control-row"><label>⚡ RES50W</label><div class="inline-buttons">
            <button id="res50wOnBtn" class="res-btn" disabled>Allumer</button>
            <button id="res50wOffBtn" class="res-btn" disabled>Éteindre</button>
        </div><span id="res50wStatus" class="feedback-value">État: --</span></div>

        <div class="control-row"><label>🌀 RES200W</label><input type="range" id="res200wSlider" min="0" max="100" step="1" disabled><span id="res200wSliderValue" class="slider-value">0</span><span class="feedback-label">↺</span><span id="res200wFeedback" class="feedback-value">--</span><span>%</span></div>
        <div class="control-row"><label>🌀 Ventil.</label><input type="range" id="fanSlider" min="0" max="100" step="1" disabled><span id="fanSliderValue" class="slider-value">0</span><span class="feedback-label">↺</span><span id="fanFeedback" class="feedback-value">--</span><span>%</span></div>
        <div class="control-row"><label>📦 Store</label><input type="range" id="storeSlider" min="0" max="100" step="1" disabled><span id="storeSliderValue" class="slider-value">0</span><span class="feedback-label">↺</span><span id="storeFeedback" class="feedback-value">--</span><span>%</span></div>
        <div class="control-row"><label>🎯 Consigne</label><input type="range" id="consigneSlider" min="0" max="60" step="0.1" disabled><span id="consigneSliderValue" class="slider-value">22.5</span><span class="feedback-label">↺</span><span id="consigneFeedback" class="feedback-value">--</span><span>°C</span></div>
    </div>

    <div class="card"><div class="flex-between"><h2>📜 Événements</h2><button id="clearLogBtn" style="background:#94a3b8;">Effacer</button></div><div id="log" class="log-box"></div></div>
</div>

<script>
    // === UUIDs (à adapter) ===
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const COMMAND_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const SENSORS = [
        { name: "Entrée",   tempUUID: "e1a0b001-0001-0001-0001-000000000001", humUUID: "e1a0b001-0001-0001-0001-000000000002" },
        { name: "Sortie",   tempUUID: "e2a0b001-0002-0002-0002-000000000001", humUUID: "e2a0b001-0002-0002-0002-000000000002" },
        { name: "Extérieur",tempUUID: "e3a0b001-0003-0003-0003-000000000001", humUUID: "e3a0b001-0003-0003-0003-000000000002" },
        { name: "Ech_E",    tempUUID: "e4a0b001-0004-0004-0004-000000000001", humUUID: "e4a0b001-0004-0004-0004-000000000002" },
        { name: "Ech_S",    tempUUID: "e5a0b001-0005-0005-0005-000000000001", humUUID: "e5a0b001-0005-0005-0005-000000000002" }
    ];
    const STORE_CHAR_UUID = "f6a0b001-0006-0006-0006-000000000006";
    const MODE_CHAR_UUID  = "f7a0b001-0007-0007-0007-000000000007";
    const CONSIGNE_CHAR_UUID = "f8a0b001-0008-0008-0008-000000000008";
    const FAN_FEEDBACK_CHAR_UUID = "f9a0b001-0009-0009-0009-000000000009";
    const TRAPPES_STATE_CHAR_UUID = "f0a0b001-0010-0010-0010-000000000010";
    const RES50W_STATE_CHAR_UUID  = "f1a0b001-0011-0011-0011-000000000011";
    const LUM_CHAR_UUID = "f2a0b001-0012-0012-0012-000000000012";
    const LUX_DAY_SETPOINT_CHAR_UUID   = "f3a0b001-0013-0013-0013-000000000013";
    const LUX_NIGHT_SETPOINT_CHAR_UUID = "f4a0b001-0014-0014-0014-000000000014";
    const VBAT_CHAR_UUID    = "f5a0b001-0015-0015-0015-000000000015";
    const IBAT_CHAR_UUID    = "f6a0b001-0016-0016-0016-000000000016";
    const VPPV_CHAR_UUID    = "f7a0b001-0017-0017-0017-000000000017";
    const PPPV_CHAR_UUID    = "f8a0b001-0018-0018-0018-000000000018";
    const BAT_STATUS_CHAR_UUID = "f9a0b001-0019-0019-0019-000000000019";
    const RES200W_FEEDBACK_CHAR_UUID = "faa0b001-0020-0020-0020-000000000020";

    let device, server, service, commandChar;
    let storeChar, modeChar, consigneChar, fanFeedbackChar, trappesStateChar, res50wStateChar;
    let lumChar, luxDayChar, luxNightChar, vbatChar, ibatChar, vppvChar, pppvChar, batStatusChar, res200wChar;

    // DOM elements
    const connectBtn = document.getElementById('connectBtn');
    const connStatusSpan = document.getElementById('connStatus');
    const offBtn = document.getElementById('offBtn');
    const fanSlider = document.getElementById('fanSlider');
    const fanSliderValueSpan = document.getElementById('fanSliderValue');
    const fanFeedbackSpan = document.getElementById('fanFeedback');
    const storeSlider = document.getElementById('storeSlider');
    const storeSliderValueSpan = document.getElementById('storeSliderValue');
    const storeFeedbackSpan = document.getElementById('storeFeedback');
    const consigneSlider = document.getElementById('consigneSlider');
    const consigneSliderValueSpan = document.getElementById('consigneSliderValue');
    const consigneFeedbackSpan = document.getElementById('consigneFeedback');
    const luxDayInput = document.getElementById('luxDayInput');
    const luxDayFeedbackSpan = document.getElementById('luxDayFeedback');
    const luxNightInput = document.getElementById('luxNightInput');
    const luxNightFeedbackSpan = document.getElementById('luxNightFeedback');
    const modeAutoBtn = document.getElementById('modeAutoBtn');
    const modeManualBtn = document.getElementById('modeManualBtn');
    const modeStatusSpan = document.getElementById('modeStatus');
    const trappesOpenBtn = document.getElementById('trappesOpenBtn');
    const trappesCloseBtn = document.getElementById('trappesCloseBtn');
    const trappesStatusSpan = document.getElementById('trappesStatus');
    const res50wOnBtn = document.getElementById('res50wOnBtn');
    const res50wOffBtn = document.getElementById('res50wOffBtn');
    const res50wStatusSpan = document.getElementById('res50wStatus');
    const lumValueSpan = document.getElementById('lumValue');
    const vbatValueSpan = document.getElementById('vbatValue');
    const ibatValueSpan = document.getElementById('ibatValue');
    const vppvValueSpan = document.getElementById('vppvValue');
    const pppvValueSpan = document.getElementById('pppvValue');
    const batStatusValueSpan = document.getElementById('batStatusValue');
    const res200wSlider = document.getElementById('res200wSlider');
    const res200wSliderValueSpan = document.getElementById('res200wSliderValue');
    const res200wFeedbackSpan = document.getElementById('res200wFeedback');
    const clearLogBtn = document.getElementById('clearLogBtn');
    const logDiv = document.getElementById('log');
    const sensorBody = document.getElementById('sensorBody');

    let consigneInteracting = false, fanInteracting = false, storeInteracting = false, res200wInteracting = false;
    let storeLastInteraction = 0;
    const STORE_DEBOUNCE_MS = 3000;

    function setControlsEnabled(enable) {
        fanSlider.disabled = !enable;
        storeSlider.disabled = !enable;
        trappesOpenBtn.disabled = !enable;
        trappesCloseBtn.disabled = !enable;
        res50wOnBtn.disabled = !enable;
        res50wOffBtn.disabled = !enable;
        res200wSlider.disabled = !enable;
    }

    function onModeChanged(modeValue) {
        const isAuto = (modeValue === "AUTO");
        setControlsEnabled(!isAuto);
        modeAutoBtn.disabled = false;
        modeManualBtn.disabled = false;
        modeAutoBtn.style.background = isAuto ? "#10b981" : "#64748b";
        modeManualBtn.style.background = isAuto ? "#64748b" : "#4488ff";
        modeStatusSpan.innerText = `Mode: ${modeValue}`;
    }

    function addLog(msg, isError = false) {
        const entry = document.createElement('div');
        entry.style.color = isError ? '#f87171' : '#a5f3fc';
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        console.log(msg);
    }
    function clearLog() { logDiv.innerHTML = ''; }

    function buildSensorTable() {
        sensorBody.innerHTML = '';
        SENSORS.forEach((s, idx) => {
            const row = document.createElement('tr');
            row.innerHTML = `<td class="sensor-name">${s.name}</td><td class="value"><span id="temp-${idx}">--</span> °C</td><td class="value"><span id="hum-${idx}">--</span> %</td>`;
            sensorBody.appendChild(row);
        });
    }

    function updateSensorUI(idx, type, value) {
        const span = document.getElementById(`${type}-${idx}`);
        if (span) span.innerText = value.toFixed(1);
    }

    function handleSensorNotification(event, idx, type) {
        const raw = new TextDecoder().decode(event.target.value);
        const match = raw.match(/(\d+\.?\d*)/);
        if (match) {
            const val = parseFloat(match[0]);
            updateSensorUI(idx, type, val);
            addLog(`📡 ${SENSORS[idx].name} ${type==='temp'?'temp.':'hum.'} : ${val.toFixed(1)} ${type==='temp'?'°C':'%'}`);
        }
    }

    // --- Feedback handlers ---
    function handleFanFeedback(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+)/);
        if (match) {
            const val = match[0];
            fanFeedbackSpan.innerText = val;
            if (!fanInteracting) { fanSlider.value = val; fanSliderValueSpan.innerText = val; }
            addLog(`🌀 Ventilateur retour : ${val} %`);
        }
    }

    function handleStoreFeedback(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+)/);
        if (match) {
            const val = match[0];
            storeFeedbackSpan.innerText = val;
            const now = Date.now();
            if (!storeInteracting && (now - storeLastInteraction) >= STORE_DEBOUNCE_MS) {
                storeSlider.value = val;
                storeSliderValueSpan.innerText = val;
                addLog(`📦 Store mis à jour (feedback) : ${val} %`);
            } else {
                addLog(`📦 Store feedback reçu : ${val} % (attente fin interaction)`);
            }
        }
    }

    function handleConsigneFeedback(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+\.?\d*)/);
        if (match) {
            const val = parseFloat(match[0]).toFixed(1);
            consigneFeedbackSpan.innerText = val;
            if (!consigneInteracting) { consigneSlider.value = val; consigneSliderValueSpan.innerText = val; }
            addLog(`🎯 Consigne retour : ${val} °C`);
        }
    }

    function handleRes200wFeedback(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+)/);
        if (match) {
            const val = match[0];
            res200wFeedbackSpan.innerText = val;
            if (!res200wInteracting) { res200wSlider.value = val; res200wSliderValueSpan.innerText = val; }
            addLog(`🌀 RES200W retour : ${val} %`);
        }
    }

    function handleModeNotification(e) {
        const val = new TextDecoder().decode(e.target.value);
        onModeChanged(val.trim());
        addLog(`⚙️ Mode retour : ${val}`);
    }

    function handleTrappesStateNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const val = raw.trim();
        const isOpen = (val === "1");
        trappesStatusSpan.innerText = `État: ${isOpen ? "Ouvert" : "Fermé"}`;
        trappesOpenBtn.style.background = isOpen ? "#10b981" : "#64748b";
        trappesCloseBtn.style.background = !isOpen ? "#10b981" : "#64748b";
        addLog(`🚪 Trappes état : ${isOpen ? "Ouvert" : "Fermé"} (${val})`);
    }

    function handleRes50wStateNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const val = raw.trim();
        const isOn = (val === "1");
        res50wStatusSpan.innerText = `État: ${isOn ? "ON" : "OFF"}`;
        res50wOnBtn.style.background = isOn ? "#10b981" : "#64748b";
        res50wOffBtn.style.background = !isOn ? "#10b981" : "#64748b";
        addLog(`⚡ RES50W état : ${isOn ? "ON" : "OFF"} (${val})`);
    }

    function handleLumNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+)/);
        if (match) { lumValueSpan.innerText = match[0]; addLog(`💡 Luminosité : ${match[0]} lumen`); }
    }
    function handleLuxDayNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+)/);
        if (match) { luxDayFeedbackSpan.innerText = match[0]; addLog(`☀️ Seuil jour retour : ${match[0]} lx`); }
    }
    function handleLuxNightNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+)/);
        if (match) { luxNightFeedbackSpan.innerText = match[0]; addLog(`🌙 Seuil nuit retour : ${match[0]} lx`); }
    }
    function handleVbatNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+\.?\d*)/);
        if (match) { vbatValueSpan.innerText = match[0]; addLog(`🔋 Vbat : ${match[0]} V`); }
    }
    function handleIbatNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+\.?\d*)/);
        if (match) { ibatValueSpan.innerText = match[0]; addLog(`🔌 Ibat : ${match[0]} A`); }
    }
    function handleVppvNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+\.?\d*)/);
        if (match) { vppvValueSpan.innerText = match[0]; addLog(`☀️ Vppv : ${match[0]} V`); }
    }
    function handlePppvNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const match = raw.match(/(\d+)/);
        if (match) { pppvValueSpan.innerText = match[0]; addLog(`⚡ Pppv : ${match[0]} W`); }
    }
    function handleBatStatusNotification(e) {
        const raw = new TextDecoder().decode(e.target.value);
        const cs = parseInt(raw, 10);
        let text = "Inconnu";
        switch(cs) {
            case 0: text = "Hors tension"; break;
            case 2: text = "Défaut"; break;
            case 3: text = "Charge rapide"; break;
            case 4: text = "Charge lente"; break;
            case 5: text = "Maintien"; break;
        }
        batStatusValueSpan.innerText = text;
        addLog(`📊 État batterie : ${text}`);
    }

    async function sendCommand(cmd) {
        if (!commandChar || !device?.gatt?.connected) {
            addLog("❌ Non connecté → commande ignorée", true);
            return false;
        }
        try {
            await commandChar.writeValue(new TextEncoder().encode(cmd));
            addLog(`📤 Commande : ${cmd}`);
            return true;
        } catch (err) {
            addLog(`❌ Erreur envoi "${cmd}" : ${err.message}`, true);
            return false;
        }
    }

    async function connect() {
        if (!navigator.bluetooth) { alert("Web Bluetooth non supporté. Utilisez Bluefy."); return; }
        addLog("🔍 Recherche des appareils BLE...");
        try {
            device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [SERVICE_UUID] });
            addLog(`✅ Appareil sélectionné : ${device.name || device.id}`);
            server = await device.gatt.connect();
            addLog("✅ Serveur GATT connecté");
            service = await server.getPrimaryService(SERVICE_UUID);
            addLog("✅ Service trouvé");
            commandChar = await service.getCharacteristic(COMMAND_CHAR_UUID);
            addLog("✅ Caractéristique commande OK");

            const subscribe = async (uuid, handler) => {
                try {
                    const c = await service.getCharacteristic(uuid);
                    await c.startNotifications();
                    c.addEventListener('characteristicvaluechanged', handler);
                    addLog(`✅ Abonné : ${uuid.slice(-8)}`);
                    return c;
                } catch(e) { addLog(`⚠️ Non trouvé : ${uuid.slice(-8)}`, true); return null; }
            };

            storeChar = await subscribe(STORE_CHAR_UUID, handleStoreFeedback);
            modeChar = await subscribe(MODE_CHAR_UUID, handleModeNotification);
            consigneChar = await subscribe(CONSIGNE_CHAR_UUID, handleConsigneFeedback);
            fanFeedbackChar = await subscribe(FAN_FEEDBACK_CHAR_UUID, handleFanFeedback);
            trappesStateChar = await subscribe(TRAPPES_STATE_CHAR_UUID, handleTrappesStateNotification);
            res50wStateChar = await subscribe(RES50W_STATE_CHAR_UUID, handleRes50wStateNotification);
            lumChar = await subscribe(LUM_CHAR_UUID, handleLumNotification);
            luxDayChar = await subscribe(LUX_DAY_SETPOINT_CHAR_UUID, handleLuxDayNotification);
            luxNightChar = await subscribe(LUX_NIGHT_SETPOINT_CHAR_UUID, handleLuxNightNotification);
            vbatChar = await subscribe(VBAT_CHAR_UUID, handleVbatNotification);
            if (vbatChar) console.log("Vbat char abonné");
            ibatChar = await subscribe(IBAT_CHAR_UUID, handleIbatNotification);
            vppvChar = await subscribe(VPPV_CHAR_UUID, handleVppvNotification);
            pppvChar = await subscribe(PPPV_CHAR_UUID, handlePppvNotification);
            batStatusChar = await subscribe(BAT_STATUS_CHAR_UUID, handleBatStatusNotification);
            res200wChar = await subscribe(RES200W_FEEDBACK_CHAR_UUID, handleRes200wFeedback);

            for (let i = 0; i < SENSORS.length; i++) {
                const s = SENSORS[i];
                try {
                    const tc = await service.getCharacteristic(s.tempUUID);
                    const hc = await service.getCharacteristic(s.humUUID);
                    await tc.startNotifications();
                    tc.addEventListener('characteristicvaluechanged', (ev) => handleSensorNotification(ev, i, 'temp'));
                    await hc.startNotifications();
                    hc.addEventListener('characteristicvaluechanged', (ev) => handleSensorNotification(ev, i, 'hum'));
                    addLog(`✅ Capteur ${s.name} abonné`);
                } catch(e) { addLog(`❌ Capteur ${s.name} non trouvé : ${e.message}`, true); }
            }

            if (consigneChar) { let v = await consigneChar.readValue(); handleConsigneFeedback({ target: { value: v } }); }
            if (luxDayChar) { let v = await luxDayChar.readValue(); handleLuxDayNotification({ target: { value: v } }); }
            if (luxNightChar) { let v = await luxNightChar.readValue(); handleLuxNightNotification({ target: { value: v } }); }

            offBtn.disabled = false;
            consigneSlider.disabled = false;
            luxDayInput.disabled = false;
            luxNightInput.disabled = false;
            setControlsEnabled(false);
            modeAutoBtn.disabled = false;
            modeManualBtn.disabled = false;
            modeStatusSpan.innerText = "Mode: --";
            modeAutoBtn.style.background = "#64748b";
            modeManualBtn.style.background = "#64748b";
            connectBtn.disabled = true;
            connStatusSpan.innerText = "Connecté";
            connStatusSpan.style.backgroundColor = "#10b981";
            addLog("🎉 Interface prête");
        } catch (err) {
            addLog(`❌ ERREUR CONNEXION : ${err.message}`, true);
            console.error(err);
            connectBtn.disabled = false;
            connStatusSpan.innerText = "Erreur";
        }
    }

    // Événements
    connectBtn.onclick = connect;
    offBtn.onclick = () => sendCommand("OFF");
    modeAutoBtn.onclick = () => sendCommand("MODE_AUTO");
    modeManualBtn.onclick = () => sendCommand("MODE_MANUAL");
    trappesOpenBtn.onclick = () => sendCommand("TRAPPES_OPEN");
    trappesCloseBtn.onclick = () => sendCommand("TRAPPES_CLOSE");
    res50wOnBtn.onclick = () => sendCommand("RES50W_ON");
    res50wOffBtn.onclick = () => sendCommand("RES50W_OFF");
    clearLogBtn.onclick = clearLog;

    fanSlider.oninput = e => { fanSliderValueSpan.innerText = e.target.value; };
    fanSlider.onchange = e => sendCommand(`FAN=${e.target.value}`);
    storeSlider.oninput = e => { storeSliderValueSpan.innerText = e.target.value; storeInteracting = true; storeLastInteraction = Date.now(); };
    storeSlider.onchange = e => sendCommand(`STORE=${e.target.value}`);
    storeSlider.addEventListener('mouseup', () => { setTimeout(() => { if (Date.now() - storeLastInteraction >= STORE_DEBOUNCE_MS) storeInteracting = false; }, 500); });
    storeSlider.addEventListener('touchend', () => { setTimeout(() => { if (Date.now() - storeLastInteraction >= STORE_DEBOUNCE_MS) storeInteracting = false; }, 500); });
    consigneSlider.oninput = e => { consigneSliderValueSpan.innerText = parseFloat(e.target.value).toFixed(1); };
    consigneSlider.onchange = e => sendCommand(`CONSIGNE=${parseFloat(e.target.value).toFixed(1)}`);
    res200wSlider.oninput = e => { res200wSliderValueSpan.innerText = e.target.value; };
    res200wSlider.onchange = e => sendCommand(`RES200W=${e.target.value}`);
    luxDayInput.onchange = () => { let v = parseInt(luxDayInput.value); if (!isNaN(v)) sendCommand(`LUX_DAY=${v}`); };
    luxNightInput.onchange = () => { let v = parseInt(luxNightInput.value); if (!isNaN(v)) sendCommand(`LUX_NIGHT=${v}`); };

    consigneSlider.addEventListener('mousedown', () => consigneInteracting = true);
    consigneSlider.addEventListener('mouseup', () => consigneInteracting = false);
    consigneSlider.addEventListener('touchstart', () => consigneInteracting = true);
    consigneSlider.addEventListener('touchend', () => consigneInteracting = false);
    fanSlider.addEventListener('mousedown', () => fanInteracting = true);
    fanSlider.addEventListener('mouseup', () => fanInteracting = false);
    fanSlider.addEventListener('touchstart', () => fanInteracting = true);
    fanSlider.addEventListener('touchend', () => fanInteracting = false);
    res200wSlider.addEventListener('mousedown', () => res200wInteracting = true);
    res200wSlider.addEventListener('mouseup', () => res200wInteracting = false);
    res200wSlider.addEventListener('touchstart', () => res200wInteracting = true);
    res200wSlider.addEventListener('touchend', () => res200wInteracting = false);

    buildSensorTable();
    addLog("📱 Interface prête – Cliquez sur 'Connecter'");
</script>
</body>
</html>
